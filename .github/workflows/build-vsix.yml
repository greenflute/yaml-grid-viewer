name: Build VSIX

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-vsix:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build webview bundle
        run: npm run build

      - name: Install VSCE
        run: npm install --global @vscode/vsce

      - name: Package VSIX
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          VSIX_NAME="yaml-viewer-${VERSION}.vsix"
          vsce package --out "$VSIX_NAME"
          echo "VSIX_NAME=$VSIX_NAME" >> "$GITHUB_ENV"

      - name: Attach VSIX to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.VSIX_NAME }}
